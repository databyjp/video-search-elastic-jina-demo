<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" filterUnits="objectBoundingBox" x="-5%" y="-3%" width="110%" height="112%">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#CBD2DC" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#F0F3F8"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Divider line -->
  <line x1="960" y1="120" x2="960" y2="960" stroke="#CBD2DC" stroke-width="2" stroke-dasharray="12,8" opacity="0.6"/>

  <!-- ==================== LEFT COLUMN: Traditional Search ==================== -->
  <g transform="translate(80, 60)">
    <!-- Column header -->
    <text x="400" y="60" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="42" font-weight="900" fill="#1C1E23" text-anchor="middle" letter-spacing="-1">Traditional Search</text>

    <!-- Document icon -->
    <g transform="translate(240, 140)">
      <rect x="0" y="0" width="320" height="200" rx="14" fill="white" stroke="#8B95A5" stroke-width="2.5" filter="url(#cardShadow)"/>
      <!-- Document lines -->
      <g opacity="0.7">
        <rect x="40" y="32" width="240" height="14" rx="3" fill="#CBD2DC"/>
        <rect x="40" y="58" width="200" height="14" rx="3" fill="#CBD2DC"/>
        <rect x="40" y="84" width="220" height="14" rx="3" fill="#CBD2DC"/>
        <rect x="40" y="110" width="180" height="14" rx="3" fill="#CBD2DC"/>
        <rect x="40" y="136" width="240" height="14" rx="3" fill="#CBD2DC"/>
        <rect x="40" y="162" width="160" height="14" rx="3" fill="#CBD2DC"/>
      </g>
      <!-- Highlight one line to show keyword match -->
      <rect x="36" y="78" width="228" height="26" rx="4" fill="#FEC514" opacity="0.35"/>
      <text x="160" y="230" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#3D4250" text-anchor="middle">Text Document</text>
    </g>

    <!-- Arrow down -->
    <g transform="translate(370, 410)">
      <line x1="30" y1="0" x2="30" y2="70" stroke="#8B95A5" stroke-width="4"/>
      <polygon points="15,65 30,90 45,65" fill="#8B95A5"/>
    </g>

    <!-- Keyword Index box -->
    <g transform="translate(240, 520)">
      <rect x="0" y="0" width="320" height="100" rx="14" fill="#1C1E23" filter="url(#cardShadow)"/>
      <text x="160" y="42" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="20" fill="#FEC514" text-anchor="middle" font-weight="700">keyword index</text>
      <text x="160" y="72" font-family="'Space Mono', 'JetBrains Mono', monospace" font-size="16" fill="#5A6068" text-anchor="middle">"elastic" → doc_42</text>
    </g>

    <!-- Arrow down -->
    <g transform="translate(370, 640)">
      <line x1="30" y1="0" x2="30" y2="70" stroke="#8B95A5" stroke-width="4"/>
      <polygon points="15,65 30,90 45,65" fill="#8B95A5"/>
    </g>

    <!-- Search result - success -->
    <g transform="translate(220, 750)">
      <rect x="0" y="0" width="360" height="100" rx="14" fill="white" stroke="#36B37E" stroke-width="3" filter="url(#cardShadow)"/>
      <!-- Checkmark -->
      <circle cx="60" cy="50" r="28" fill="#36B37E" opacity="0.15"/>
      <path d="M 45 50 L 55 62 L 78 38" fill="none" stroke="#36B37E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="106" y="44" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#1C1E23">Found it!</text>
      <text x="106" y="72" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#3D4250">Text query → text match</text>
    </g>

    <!-- Bottom label -->
    <text x="400" y="920" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#36B37E" text-anchor="middle">Works great for text ✓</text>
  </g>

  <!-- ==================== RIGHT COLUMN: Video Content ==================== -->
  <g transform="translate(1040, 60)">
    <!-- Column header -->
    <text x="400" y="60" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="42" font-weight="900" fill="#1C1E23" text-anchor="middle" letter-spacing="-1">Video Content</text>

    <!-- Film strip / video icon -->
    <g transform="translate(220, 140)">
      <rect x="0" y="0" width="360" height="200" rx="14" fill="#1C1E23" stroke="#3D4250" stroke-width="2.5" filter="url(#cardShadow)"/>
      <!-- Film strip perforations left -->
      <g opacity="0.4">
        <rect x="10" y="14" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="10" y="38" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="10" y="62" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="10" y="86" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="10" y="110" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="10" y="134" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="10" y="158" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="10" y="178" width="16" height="12" rx="2" fill="#5A6068"/>
      </g>
      <!-- Film strip perforations right -->
      <g opacity="0.4">
        <rect x="334" y="14" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="334" y="38" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="334" y="62" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="334" y="86" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="334" y="110" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="334" y="134" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="334" y="158" width="16" height="12" rx="2" fill="#5A6068"/>
        <rect x="334" y="178" width="16" height="12" rx="2" fill="#5A6068"/>
      </g>
      <!-- Video frames -->
      <rect x="40" y="14" width="90" height="72" rx="4" fill="#3D4250"/>
      <rect x="140" y="14" width="90" height="72" rx="4" fill="#3D4250"/>
      <rect x="240" y="14" width="80" height="72" rx="4" fill="#3D4250"/>
      <rect x="40" y="100" width="90" height="72" rx="4" fill="#3D4250"/>
      <rect x="140" y="100" width="90" height="72" rx="4" fill="#3D4250"/>
      <rect x="240" y="100" width="80" height="72" rx="4" fill="#3D4250"/>
      <!-- Play button in center frame -->
      <polygon points="170,128 170,158 195,143" fill="#8B95A5" opacity="0.6"/>
      <text x="180" y="230" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#3D4250" text-anchor="middle">Video / Audio / Images</text>
    </g>

    <!-- Arrow down -->
    <g transform="translate(370, 410)">
      <line x1="30" y1="0" x2="30" y2="70" stroke="#8B95A5" stroke-width="4"/>
      <polygon points="15,65 30,90 45,65" fill="#8B95A5"/>
    </g>

    <!-- ??? box -->
    <g transform="translate(240, 520)">
      <rect x="0" y="0" width="320" height="100" rx="14" fill="white" stroke="#F04E98" stroke-width="3" stroke-dasharray="10,6" filter="url(#cardShadow)"/>
      <text x="160" y="62" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="900" fill="#F04E98" text-anchor="middle" letter-spacing="8">? ? ?</text>
    </g>

    <!-- Arrow down -->
    <g transform="translate(370, 640)">
      <line x1="30" y1="0" x2="30" y2="70" stroke="#8B95A5" stroke-width="4"/>
      <polygon points="15,65 30,90 45,65" fill="#8B95A5"/>
    </g>

    <!-- Search result - failure -->
    <g transform="translate(220, 750)">
      <rect x="0" y="0" width="360" height="100" rx="14" fill="white" stroke="#F04E98" stroke-width="3" filter="url(#cardShadow)"/>
      <!-- X mark -->
      <circle cx="60" cy="50" r="28" fill="#F04E98" opacity="0.15"/>
      <line x1="44" y1="34" x2="76" y2="66" stroke="#F04E98" stroke-width="5" stroke-linecap="round"/>
      <line x1="76" y1="34" x2="44" y2="66" stroke="#F04E98" stroke-width="5" stroke-linecap="round"/>
      <text x="106" y="44" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#1C1E23">No results</text>
      <text x="106" y="72" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#3D4250">Text query → ???</text>
    </g>

    <!-- Bottom label -->
    <text x="400" y="920" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#F04E98" text-anchor="middle">What about this? 🤔</text>
  </g>

  <!-- Footer / subtle branding -->
  <line x1="80" y1="1010" x2="1840" y2="1010" stroke="#CBD2DC" stroke-width="1"/>
  <text x="960" y="1050" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#98A2B3" text-anchor="middle">Keyword search works for text — but most of the world's data isn't text.</text>
</svg>
