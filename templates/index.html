<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnimodal Search</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
</head>
<body>
    <main class="container">
        <h1>Omnimodal Search</h1>
        <form hx-post="/search" hx-target="#results" hx-swap="innerHTML" hx-indicator="#spinner">
            <div role="group">
                <input type="text" name="query" placeholder="Search videos…" autofocus required>
                <button type="submit">Search</button>
            </div>
        </form>
        <p id="spinner" aria-busy="true">Searching…</p>
        <div id="results"></div>
    </main>

    <script>
        // Seek each result video to its scene start time after HTMX injects results
        document.addEventListener("htmx:afterSwap", () => {
            document.querySelectorAll("video[data-start]").forEach(v => {
                v.currentTime = parseFloat(v.dataset.start);
            });
        });
    </script>
</body>
</html>
